<nz-table #basicTables [nzData]="options.controls" [nzFrontPagination]="false" [nzShowPagination]="false">
  <tbody cdkDropList (cdkDropListDropped)="drop($event)">
    @for (option of options.controls; track option.value; let i = $index) {
      <tr cdkDrag [cdkDragData]="option">
        <td nzAlign="left">
          <div style="display: flex; align-items: center; gap: 8px;">

            <span cdkDragHandle nz-icon nzType="drag" nzTheme="outline" style="cursor: grab; color: #bfbfbf; font-size: 16px;"></span>

            @if (editingIndex() !== i) {
              <span style="padding-right: 4px; flex-grow: 1;">{{ option.value }}</span>
              <button nz-button nzType="link" (click)="startEdit(i, option.value)">
                <nz-icon nzType="edit" nzTheme="outline"></nz-icon>
              </button>
              <button nz-button nzType="link" nzDanger (click)="removeOption(i)">
                <nz-icon nzType="delete" nzTheme="outline"></nz-icon>
              </button>
            } @else {
              <input nz-input [formControl]="editControl" style="width: 150px" />
              <button nz-button nzType="link" (click)="saveEdit(i)">
                <nz-icon nzType="check" nzTheme="outline"></nz-icon>
              </button>
              <button nz-button nzType="link" (click)="cancelEdit()">
                <nz-icon nzType="close" nzTheme="outline"></nz-icon>
              </button>
              @if (editError()) {
                <div style="color: red; margin-left: 8px;">{{ editError() }}</div>
              }
            }
          </div>
        </td>
      </tr>
    }
  </tbody>
</nz-table>
